<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>CYBERPUNK 777 - Lite</title>
    <style>
        body { margin: 0; background: #0a0a0f; color: #ff00ff; font-family: 'Courier New', monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { position: relative; border: 4px solid #00f2ff; box-shadow: 0 0 20px #00f2ff, inset 0 0 10px #00f2ff; }
        canvas { display: block; background: #050508; }
        #hud { position: absolute; top: 10; left: 10; pointer-events: none; text-shadow: 2px 2px #000; }
        .glitch { animation: glitch 1s linear infinite; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div style="font-size: 20px;">SYSTEM STATUS: <span id="hp">100</span>%</div>
        <div style="color: #00f2ff;">NEURO-SCORE: <span id="score">0</span></div>
    </div>
    <canvas id="ctx"></canvas>
</div>

<script>
const canvas = document.getElementById('ctx');
const ctx = canvas.getContext('2d');
canvas.width = 800; canvas.height = 600;

let player = { x: 400, y: 300, r: 15, color: '#00f2ff', hp: 100, score: 0, dash: 0 };
let enemies = [];
let particles = [];
let keys = {};
let mouse = { x: 0, y: 0 };

window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);
window.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});
window.addEventListener('mousedown', () => { if(player.dash <= 0) player.dash = 20; });

function spawnEnemy() {
    let side = Math.floor(Math.random() * 4);
    let x, y;
    if(side === 0) { x = Math.random()*canvas.width; y = -30; }
    else if(side === 1) { x = Math.random()*canvas.width; y = canvas.height+30; }
    else if(side === 2) { x = -30; y = Math.random()*canvas.height; }
    else { x = canvas.width+30; y = Math.random()*canvas.height; }
    enemies.push({ x, y, r: 12, speed: 1.5 + (player.score/500) });
}

function createExplosion(x, y, color) {
    for(let i=0; i<15; i++) {
        particles.push({
            x, y, 
            vx: (Math.random()-0.5)*8, 
            vy: (Math.random()-0.5)*8, 
            life: 1, 
            color
        });
    }
}

function update() {
    // Mouvement avec inertie Cyber
    let speed = player.dash > 0 ? 12 : 4;
    if(player.dash > 0) player.dash--;

    if(keys['KeyW'] || keys['ArrowUp']) player.y -= speed;
    if(keys['KeyS'] || keys['ArrowDown']) player.y += speed;
    if(keys['KeyA'] || keys['ArrowLeft']) player.x -= speed;
    if(keys['KeyD'] || keys['ArrowRight']) player.x += speed;

    // Ennemis
    if(Math.random() < 0.03) spawnEnemy();

    enemies.forEach((en, i) => {
        let dx = player.x - en.x;
        let dy = player.y - en.y;
        let dist = Math.sqrt(dx*dx + dy*dy);
        en.x += (dx/dist) * en.speed;
        en.y += (dy/dist) * en.speed;

        // Collision
        if(dist < player.r + en.r) {
            if(player.dash > 0) { // On "slash" l'ennemi en dashant
                createExplosion(en.x, en.y, '#ff00ff');
                enemies.splice(i, 1);
                player.score += 50;
                document.getElementById('score').innerText = player.score;
            } else {
                player.hp -= 0.5;
                document.getElementById('hp').innerText = Math.ceil(player.hp);
                if(player.hp <= 0) location.reload();
            }
        }
    });

    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02;
        if(p.life <= 0) particles.splice(i, 1);
    });
}

function draw() {
    ctx.fillStyle = 'rgba(5, 5, 8, 0.3)'; // Traînée de mouvement
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Dessin de la "pluie" statique
    ctx.strokeStyle = 'rgba(0, 242, 255, 0.05)';
    for(let i=0; i<5; i++) {
        let x = Math.random()*canvas.width;
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x-20, canvas.height); ctx.stroke();
    }

    // Joueur
    ctx.shadowBlur = 15;
    ctx.shadowColor = player.color;
    ctx.fillStyle = player.color;
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.r, 0, Math.PI*2);
    ctx.fill();

    // Direction du regard (viseur laser)
    ctx.strokeStyle = 'rgba(255, 0, 255, 0.3)';
    ctx.setLineDash([5, 15]);
    ctx.beginPath();
    ctx.moveTo(player.x, player.y);
    ctx.lineTo(mouse.x, mouse.y);
    ctx.stroke();
    ctx.setLineDash([]);

    // Ennemis (Drones rouges)
    ctx.shadowColor = '#ff0055';
    ctx.fillStyle = '#ff0055';
    enemies.forEach(en => {
        ctx.beginPath();
        ctx.arc(en.x, en.y, en.r, 0, Math.PI*2);
        ctx.fill();
    });

    // Particules
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 2, 2);
    });
    ctx.globalAlpha = 1;

    update();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
