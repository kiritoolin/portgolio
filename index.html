<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Neon Dash - Mini Jeu</title>
    <style>
        body {
            margin: 0;
            background: #050505;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        canvas {
            border: 3px solid #00ffcc;
            box-shadow: 0 0 20px #00ffcc;
            background: #000;
        }
        h1 { text-shadow: 0 0 10px #00ffcc; }
    </style>
</head>
<body>

    <h1>NEON DASH</h1>
    <canvas id="gameCanvas" width="400" height="500"></canvas>
    <p>Utilisez les flèches ← → pour survivre</p>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Paramètres du joueur
        const player = {
            x: 180,
            y: 440,
            width: 40,
            height: 40,
            color: "#00ffcc",
            speed: 7
        };

        // Obstacles
        const enemies = [];
        let score = 0;
        let gameActive = true;
        let enemySpeed = 3;

        // Contrôles
        const keys = {};
        document.addEventListener("keydown", (e) => keys[e.code] = true);
        document.addEventListener("keyup", (e) => keys[e.code] = false);

        function spawnEnemy() {
            const size = Math.random() * (60 - 20) + 20;
            const x = Math.random() * (canvas.width - size);
            enemies.push({ x, y: -size, size, speed: enemySpeed + Math.random() * 2 });
        }

        function update() {
            if (!gameActive) return;

            // Mouvement joueur
            if (keys["ArrowLeft"] && player.x > 0) player.x -= player.speed;
            if (keys["ArrowRight"] && player.x < canvas.width - player.width) player.x += player.speed;

            // Gestion des ennemis
            if (Math.random() < 0.03) spawnEnemy();

            for (let i = enemies.length - 1; i >= 0; i--) {
                let e = enemies[i];
                e.y += e.speed;

                // Collision
                if (
                    player.x < e.x + e.size &&
                    player.x + player.width > e.x &&
                    player.y < e.y + e.size &&
                    player.y + player.height > e.y
                ) {
                    gameActive = false;
                    alert("GAME OVER ! Score : " + score);
                    location.reload();
                }

                // Score et suppression
                if (e.y > canvas.height) {
                    enemies.splice(i, 1);
                    score++;
                    enemySpeed += 0.1; // Difficulté progressive
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dessiner joueur
            ctx.fillStyle = player.color;
            ctx.shadowBlur = 15;
            ctx.shadowColor = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);

            // Dessiner ennemis
            ctx.fillStyle = "#ff0055";
            ctx.shadowColor = "#ff0055";
            enemies.forEach(e => {
                ctx.fillRect(e.x, e.y, e.size, e.size);
            });

            // Score
            ctx.fillStyle = "white";
            ctx.shadowBlur = 0;
            ctx.font = "20px Arial";
            ctx.fillText("Score: " + score, 10, 30);

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        draw();
    </script>
</body>
</html>
