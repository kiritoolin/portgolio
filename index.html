<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>CYBER-CITY 777: OPEN WORLD</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; bottom: 20px; left: 20px; color: #00f2ff; text-shadow: 0 0 5px #00f2ff; }
        canvas { display: block; }
        #overlay {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 80%);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="overlay"></div>
<div id="ui">
    <div style="font-size: 24px; letter-spacing: 5px;">NEO-CITY DISTRICT 07</div>
    <div id="coords">X: 0 | Y: 0</div>
</div>
<canvas id="cityCanvas"></canvas>

<script>
const canvas = document.getElementById('cityCanvas');
const ctx = canvas.getContext('2d');
const coordsEl = document.getElementById('coords');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Caméra et Monde
let camera = { x: 0, y: 0 };
let player = { x: 0, y: 0, angle: 0, speed: 4 };
let keys = {};
let buildings = [];
let particles = [];

// Configuration du monde
const GRID_SIZE = 400; // Taille d'un bloc de ville

// Génération de bâtiments déterministe basée sur les coordonnées
function getBuildingSeed(gridX, gridY) {
    const buildingsInBlock = [];
    // On utilise un faux random basé sur la position pour que la ville reste la même si on revient
    let seed = Math.sin(gridX * 12.9898 + gridY * 78.233) * 43758.5453;
    let rand = () => { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; };

    for(let i=0; i<4; i++) {
        buildingsInBlock.push({
            x: gridX * GRID_SIZE + rand() * (GRID_SIZE - 100),
            y: gridY * GRID_SIZE + rand() * (GRID_SIZE - 100),
            w: 60 + rand() * 80,
            h: 60 + rand() * 80,
            color: rand() > 0.5 ? '#1a1a2e' : '#16213e',
            neon: rand() > 0.5 ? '#00f2ff' : '#ff00ff'
        });
    }
    return buildingsInBlock;
}

window.onkeydown = e => keys[e.code] = true;
window.onkeyup = e => keys[e.code] = false;

function update() {
    // Déplacement
    if(keys['KeyW'] || keys['ArrowUp']) player.y -= player.speed;
    if(keys['KeyS'] || keys['ArrowDown']) player.y += player.speed;
    if(keys['KeyA'] || keys['ArrowLeft']) player.x -= player.speed;
    if(keys['KeyD'] || keys['ArrowRight']) player.x += player.speed;

    // La caméra suit le joueur
    camera.x = player.x - canvas.width / 2;
    camera.y = player.y - canvas.height / 2;

    coordsEl.innerText = `X: ${Math.floor(player.x)} | Y: ${Math.floor(player.y)}`;
}

function draw() {
    ctx.fillStyle = "#050508";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Dessiner le sol (grille futuriste)
    ctx.strokeStyle = "#0a0a1a";
    ctx.lineWidth = 1;
    let offsetX = -camera.x % 50;
    let offsetY = -camera.y % 50;
    for(let x=offsetX; x<canvas.width; x+=50) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
    }
    for(let y=offsetY; y<canvas.height; y+=50) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
    }

    // Calculer quels blocs de ville afficher
    let startGridX = Math.floor(camera.x / GRID_SIZE);
    let endGridX = Math.ceil((camera.x + canvas.width) / GRID_SIZE);
    let startGridY = Math.floor(camera.y / GRID_SIZE);
    let endGridY = Math.ceil((camera.y + canvas.height) / GRID_SIZE);

    for(let gx = startGridX; gx <= endGridX; gx++) {
        for(let gy = startGridY; gy <= endGridY; gy++) {
            let block = getBuildingSeed(gx, gy);
            block.forEach(b => {
                // Dessiner l'ombre du bâtiment pour le "réalisme"
                ctx.fillStyle = "rgba(0,0,0,0.5)";
                ctx.fillRect(b.x - camera.x + 10, b.y - camera.y + 10, b.w, b.h);

                // Corps du bâtiment
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x - camera.x, b.y - camera.y, b.w, b.h);

                // Fenêtres lumineuses (Néons)
                ctx.strokeStyle = b.neon;
                ctx.lineWidth = 2;
                ctx.strokeRect(b.x - camera.x + 5, b.y - camera.y + 5, b.w - 10, b.h - 10);
                
                // Lueur néon
                ctx.shadowBlur = 10;
                ctx.shadowColor = b.neon;
                ctx.strokeRect(b.x - camera.x + 2, b.y - camera.y + 2, b.w - 4, b.h - 4);
                ctx.shadowBlur = 0;
            });
        }
    }

    // Dessiner le joueur (Avatar Cyber)
    ctx.fillStyle = "#fff";
    ctx.shadowBlur = 20;
    ctx.shadowColor = "#00f2ff";
    ctx.beginPath();
    ctx.arc(player.x - camera.x, player.y - camera.y, 10, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;

    update();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
