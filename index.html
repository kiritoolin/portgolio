<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NIGHT CITY // NETRUNNER PROTOCOL - FIRST PERSON</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #000;
        font-family: 'Courier New', monospace;
        color: #00ff9d;
    }
    #container {
        position: relative;
        width: 100vw;
        height: 100vh;
    }
    canvas {
        position: absolute;
        top: 0;
        left: 0;
        image-rendering: pixelated;
    }
    .hud {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 20;
    }
    .top-hud {
        position: absolute;
        top: 15px;
        left: 20px;
        right: 20px;
        display: flex;
        justify-content: space-between;
        font-size: 17px;
        text-shadow: 0 0 8px #00ff9d;
    }
    .crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 30px;
        color: #00ffff;
        text-shadow: 0 0 10px #00ffff;
        pointer-events: none;
        opacity: 0.7;
    }
    .breach-overlay {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(5, 5, 25, 0.92);
        border: 3px solid #ff00ff;
        padding: 30px 40px;
        box-shadow: 0 0 60px #ff00ff, inset 0 0 30px rgba(255,0,255,0.3);
        pointer-events: all;
        width: 720px;
    }
    .grid {
        display: grid;
        grid-template-columns: repeat(6, 68px);
        gap: 10px;
        margin: 25px 0;
    }
    .cell {
        width: 68px;
        height: 68px;
        background: #0a0a20;
        border: 2px solid #00ffff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 26px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.12s;
    }
    .cell:hover {
        background: #00ff9d;
        color: #000;
        transform: scale(1.12);
    }
    .cell.selected {
        background: #ff00ff;
        color: white;
        box-shadow: 0 0 25px #ff00ff;
    }
    button {
        background: #ff00ff;
        color: white;
        border: none;
        padding: 14px 35px;
        font-size: 18px;
        margin: 8px;
        cursor: pointer;
        box-shadow: 0 0 20px #ff00ff;
    }
    button:hover {
        background: #ffff00;
        color: #000;
    }
    .log {
        position: absolute;
        bottom: 30px;
        right: 30px;
        width: 420px;
        height: 160px;
        background: rgba(0,0,0,0.85);
        border: 1px solid #00ff9d;
        padding: 12px;
        font-size: 14px;
        overflow-y: auto;
        color: #00ffff;
    }
    .glitch {
        animation: glitch 0.4s linear infinite;
    }
    @keyframes glitch {
        0% { transform: translate(0); }
        20% { transform: translate(-3px, 3px); }
        40% { transform: translate(3px, -3px); }
        60% { transform: translate(-2px, 2px); }
        80% { transform: translate(2px, -2px); }
        100% { transform: translate(0); }
    }
</style>
</head>
<body>

<div id="container">
    <canvas id="bgCanvas" width="1920" height="1080"></canvas>
    
    <div class="hud">
        <div class="top-hud">
            <div>LOCATION: <span style="color:#ff00ff">PACIFICA - APARTMENT 47</span></div>
            <div>NETRUNNER: <span id="name">V3X-47</span></div>
            <div>TIME LEFT: <span id="timer" style="color:#ffff00">45</span>s</div>
        </div>
        
        <div class="crosshair">+</div>
        
        <!-- Breach Panel -->
        <div class="breach-overlay" id="breachPanel">
            <div style="text-align:center; font-size:24px; margin-bottom:15px; color:#ffff00;" class="glitch">
                BREACH PROTOCOL INITIATED
            </div>
            <div style="text-align:center; margin-bottom:10px;">
                TARGET SEQUENCE: <span id="targetSeq" style="color:#ffff00; font-size:22px;"></span>
            </div>
            
            <div class="grid" id="grid"></div>
            
            <div style="margin:20px 0; font-size:21px; text-align:center;">
                BUFFER → <span id="bufferDisplay" style="color:#ffff00;"></span>
            </div>
            
            <div style="text-align:center">
                <button onclick="executeBreach()">EXECUTE BREACH</button>
                <button onclick="resetCurrentBreach()" style="background:#222">CLEAR BUFFER</button>
            </div>
        </div>
        
        <div class="log" id="log"></div>
    </div>
</div>

<script>
// Canvas background (Night City FPS style)
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');

let time = 0;
let buildings = [];
let lights = [];

class NeonBuilding {
    constructor() {
        this.x = Math.random() * canvas.width;
        this.speed = 1.2 + Math.random() * 1.8;
        this.height = 400 + Math.random() * 500;
        this.width = 90 + Math.random() * 80;
        this.neonColor = ['#ff00ff', '#00ffff', '#ffff00'][Math.floor(Math.random()*3)];
    }
    update() {
        this.x -= this.speed;
        if (this.x < -this.width) this.x = canvas.width + 100;
    }
    draw() {
        ctx.fillStyle = '#111122';
        ctx.fillRect(this.x, canvas.height - this.height, this.width, this.height);
        
        // Neon windows
        ctx.fillStyle = this.neonColor + '44';
        for (let i = 0; i < 8; i++) {
            ctx.fillRect(this.x + 15 + (i%3)*25, canvas.height - this.height + 40 + Math.floor(i/3)*80, 12, 25);
        }
    }
}

// Init buildings
for (let i = 0; i < 18; i++) {
    buildings.push(new NeonBuilding());
}

function drawBackground() {
    // Sky + fog
    ctx.fillStyle = '#0a001f';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Distant buildings
    buildings.forEach(b => {
        b.update();
        b.draw();
    });
    
    // Rain effect
    ctx.strokeStyle = '#00ddff33';
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 120; i++) {
        const x = (time * 3 + i * 17) % (canvas.width + 100) - 50;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x + 8, 280);
        ctx.stroke();
    }
    
    time += 0.8;
    requestAnimationFrame(drawBackground);
}
drawBackground();

// ==================== BREACH GAME LOGIC ====================
const codes = ["1C","55","BD","E9","A7","FF","07","C3","4B","9F","2D","8E"];
let selected = [];
let targetSequence = [];
let timerLeft = 45;
let timerId;

const gridContainer = document.getElementById('grid');
const targetEl = document.getElementById('targetSeq');
const bufferEl = document.getElementById('bufferDisplay');
const logEl = document.getElementById('log');
const timerEl = document.getElementById('timer');

function generateTargetSequence() {
    const length = 5 + Math.floor(Math.random() * 4);
    targetSequence = [];
    for (let i = 0; i < length; i++) {
        targetSequence.push(codes[Math.floor(Math.random() * codes.length)]);
    }
    targetEl.textContent = targetSequence.join("  →  ");
}

function createGrid() {
    gridContainer.innerHTML = '';
    selected = [];
    
    for (let i = 0; i < 36; i++) {   // 6x6
        const cell = document.createElement('div');
        cell.className = 'cell';
        const value = codes[Math.floor(Math.random() * codes.length)];
        cell.textContent = value;
        cell.dataset.value = value;
        cell.addEventListener('click', () => {
            if (selected.length < 9 && !selected.includes(cell)) {
                selected.push(cell);
                cell.classList.add('selected');
                updateBuffer();
            }
        });
        gridContainer.appendChild(cell);
    }
}

function updateBuffer() {
    const values = selected.map(cell => cell.dataset.value);
    bufferEl.textContent = values.join(" ");
}

function executeBreach() {
    const playerSeq = selected.map(cell => cell.dataset.value);
    
    if (playerSeq.join("") === targetSequence.join("")) {
        addLog(">> BREACH SUCCESSFUL - ICE BROKEN - DAEMON ACQUIRED", "#00ff00");
        alert("HACK RÉUSSI ! Tu viens de cracker un subnet corporat de Night City.");
        scoreUp();
        resetCurrentBreach(true);
    } else {
        addLog(">> BREACH FAILED - NETWATCH TRACE ACTIVE", "#ff0066");
        // petite pénalité
    }
}

function addLog(text, color = "#00ffff") {
    const entry = document.createElement('div');
    entry.style.color = color;
    entry.innerHTML = text;
    logEl.appendChild(entry);
    logEl.scrollTop = logEl.scrollHeight;
}

function resetCurrentBreach(success = false) {
    selected = [];
    document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected'));
    bufferEl.textContent = '';
    generateTargetSequence();
    createGrid();
    
    if (success) {
        timerLeft = 45;
    }
}

function startTimer() {
    clearInterval(timerId);
    timerId = setInterval(() => {
        timerLeft--;
        timerEl.textContent = timerLeft;
        if (timerLeft <= 10) timerEl.style.color = "#ff0000";
        if (timerLeft <= 0) {
            clearInterval(timerId);
            addLog(">> CONNECTION LOST - NETWATCH HAS YOU", "#ff0000");
            alert("Temps écoulé. Tu t'es fait tracer, choomba.");
            resetCurrentBreach();
        }
    }, 1000);
}

// Init
generateTargetSequence();
createGrid();
startTimer();
addLog(">> Connexion établie avec le subnet de Night City...", "#00ff9d");
</script>

</body>
</html>
