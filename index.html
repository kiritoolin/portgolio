<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NIGHT CITY BREACH PROTOCOL v2.0</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        background: radial-gradient(circle at center, #0a0a1f 0%, #000 80%);
        color: #00ff9d;
        font-family: 'Courier New', monospace;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        image-rendering: pixelated;
    }

    .terminal {
        width: 900px;
        background: rgba(10, 10, 30, 0.95);
        border: 3px solid #00ff9d;
        box-shadow: 0 0 40px #00ff9d, inset 0 0 30px rgba(0, 255, 157, 0.2);
        padding: 20px;
        position: relative;
    }

    .header {
        text-align: center;
        font-size: 28px;
        text-transform: uppercase;
        letter-spacing: 4px;
        margin-bottom: 15px;
        text-shadow: 0 0 10px #ff00ff;
        animation: glitch 1.5s infinite;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
        margin: 20px 0;
        background: #000;
        padding: 15px;
        border: 2px solid #ff00ff;
    }

    .cell {
        width: 70px;
        height: 70px;
        background: #111;
        border: 2px solid #00ffff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.1s;
        text-shadow: 0 0 8px #00ffff;
    }

    .cell:hover {
        background: #00ff9d;
        color: #000;
        transform: scale(1.1);
    }

    .cell.selected {
        background: #ff00ff;
        color: white;
        box-shadow: 0 0 20px #ff00ff;
    }

    .buffer {
        margin: 20px 0;
        padding: 15px;
        background: #000;
        border: 2px solid #ffff00;
        min-height: 60px;
        font-size: 24px;
        letter-spacing: 6px;
    }

    button {
        background: #ff00ff;
        color: white;
        border: none;
        padding: 12px 30px;
        font-size: 18px;
        margin: 10px;
        cursor: pointer;
        text-transform: uppercase;
        box-shadow: 0 0 15px #ff00ff;
    }

    button:hover {
        background: #ffff00;
        color: #000;
        box-shadow: 0 0 25px #ffff00;
    }

    .log {
        height: 120px;
        overflow-y: auto;
        background: #000;
        padding: 10px;
        font-size: 14px;
        color: #00ffff;
        border-top: 2px solid #00ff9d;
    }

    .success { color: #00ff00; }
    .fail { color: #ff0000; }

    @keyframes glitch {
        0% { text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff; }
        20% { text-shadow: -2px 0 #ff00ff, 2px 0 #00ffff; }
        100% { text-shadow: 2px 0 #ff00ff, -2px 0 #00ffff; }
    }
</style>
</head>
<body>

<div class="terminal">
    <div class="header">BREACH PROTOCOL // NIGHT CITY 2077</div>
    
    <div id="objective">Objectif : Trouve la séquence <span id="target" style="color:#ffff00"></span></div>
    
    <div class="grid" id="grid"></div>
    
    <div>Buffer :</div>
    <div class="buffer" id="buffer">Clique sur les cellules pour remplir le buffer...</div>
    
    <div style="text-align:center">
        <button onclick="submitSequence()">EXECUTE BREACH</button>
        <button onclick="resetGame()">NOUVEAU HACK</button>
    </div>
    
    <div class="log" id="log"></div>
</div>

<script>
// Données Cyberpunk style
const codes = ["1C", "55", "BD", "E9", "A7", "FF", "07", "C3"];
let grid = [];
let selected = [];
let targetSequence = [];
let bufferSize = 8;

function generateGrid() {
    grid = [];
    const gridDiv = document.getElementById('grid');
    gridDiv.innerHTML = '';
    
    for (let i = 0; i < 25; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        const value = codes[Math.floor(Math.random() * codes.length)];
        cell.textContent = value;
        cell.dataset.value = value;
        cell.onclick = () => selectCell(cell);
        gridDiv.appendChild(cell);
        grid.push(value);
    }
}

function generateTarget() {
    const length = Math.floor(Math.random() * 4) + 4; // 4 à 7 codes
    targetSequence = [];
    for (let i = 0; i < length; i++) {
        targetSequence.push(codes[Math.floor(Math.random() * codes.length)]);
    }
    document.getElementById('target').textContent = targetSequence.join(' → ');
}

function selectCell(cell) {
    if (selected.length >= bufferSize) return;
    
    if (!selected.includes(cell)) {
        cell.classList.add('selected');
        selected.push(cell);
        updateBuffer();
    }
}

function updateBuffer() {
    const bufferDiv = document.getElementById('buffer');
    const values = selected.map(c => c.dataset.value);
    bufferDiv.textContent = values.join('  ');
}

function submitSequence() {
    const log = document.getElementById('log');
    const values = selected.map(c => c.dataset.value);
    
    if (values.join('') === targetSequence.join('')) {
        log.innerHTML += `<span class="success">>> BREACH RÉUSSI ! +5000 EDDIES & DAEMON V3 ACQUIS</span><br>`;
        log.scrollTop = log.scrollHeight;
        setTimeout(() => alert("HACK RÉUSSI ! Tu viens de cracker un accès point de Night City. Choomba, t'es une légende."), 300);
    } else {
        log.innerHTML += `<span class="fail">>> BREACH ÉCHOUÉ - Trace détectée par NetWatch</span><br>`;
        log.scrollTop = log.scrollHeight;
    }
}

function resetGame() {
    selected = [];
    document.querySelectorAll('.cell').forEach(c => c.classList.remove('selected'));
    document.getElementById('buffer').textContent = 'Clique sur les cellules pour remplir le buffer...';
    document.getElementById('log').innerHTML = '';
    generateTarget();
}

// Lancement du jeu
generateGrid();
generateTarget();
</script>

</body>
</html>
